<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="60%" style="stop-color:#D97706"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Rocket body -->
  <path d="M256 80c-40 60-70 130-70 210 0 30 10 55 25 72h90c15-17 25-42 25-72 0-80-30-150-70-210z" fill="#FFFFFF"/>
  <!-- Rocket nose cone highlight -->
  <path d="M256 80c-20 30-38 65-50 105h100c-12-40-30-75-50-105z" fill="#F1F5F9" opacity="0.5"/>
  <!-- Window -->
  <circle cx="256" cy="245" r="32" fill="url(#bg)"/>
  <circle cx="256" cy="245" r="22" fill="#0F172A"/>
  <circle cx="248" cy="238" r="6" fill="#3B82F6" opacity="0.6"/>
  <!-- Left fin -->
  <path d="M186 320c-40 20-60 60-65 90l65-30z" fill="#FFFFFF" opacity="0.9"/>
  <!-- Right fin -->
  <path d="M326 320c40 20 60 60 65 90l-65-30z" fill="#FFFFFF" opacity="0.9"/>
  <!-- Rocket base -->
  <rect x="211" y="355" width="90" height="20" rx="4" fill="#E2E8F0"/>
  <!-- Flame -->
  <path d="M230 375 q-5 40 0 70 q10 20 26 35 q16-15 26-35 q5-30 0-70z" fill="url(#flame)" opacity="0.95"/>
  <path d="M240 375 q-3 30 0 50 q8 15 16 25 q8-10 16-25 q3-20 0-50z" fill="#FEF3C7" opacity="0.7"/>
</svg>
