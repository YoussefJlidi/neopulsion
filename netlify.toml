[build]
  publish = "."
  functions = "netlify/functions"

[build.processing.html]
  pretty_urls = false

# Redirect non-.html URLs to .html canonical versions
[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 301
  force = true
[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 301
  force = true
