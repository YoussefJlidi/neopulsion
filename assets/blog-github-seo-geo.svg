<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>

    <!-- Blue glow gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="rgba(255,255,255,0.06)"/>
    </pattern>

    <!-- Octocat glow filter -->
    <filter id="octoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.231  0 0 0 0 0.510  0 0 0 0 0.965  0 0 0 0.4 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft text glow -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.231  0 0 0 0 0.510  0 0 0 0 0.965  0 0 0 0.6 0"/>
    </filter>

    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Dot overlay -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Large blue glow behind octocat -->
  <ellipse cx="600" cy="280" rx="350" ry="280" fill="url(#glow)"/>

  <!-- Decorative code elements - left side -->
  <g opacity="0.08" fill="none" stroke="#ffffff" stroke-width="1.2">
    <!-- Left brackets -->
    <text x="80" y="150" font-family="monospace" font-size="28" fill="#ffffff" stroke="none" opacity="0.07">&lt;/&gt;</text>
    <text x="120" y="420" font-family="monospace" font-size="22" fill="#ffffff" stroke="none" opacity="0.05">{ }</text>
    <text x="60" y="500" font-family="monospace" font-size="18" fill="#ffffff" stroke="none" opacity="0.06">[ ]</text>
    <text x="160" y="200" font-family="monospace" font-size="16" fill="#ffffff" stroke="none" opacity="0.04">fn()</text>
  </g>

  <!-- Decorative code elements - right side -->
  <g opacity="0.08" fill="none" stroke="#ffffff" stroke-width="1.2">
    <text x="1020" y="180" font-family="monospace" font-size="24" fill="#ffffff" stroke="none" opacity="0.06">/**</text>
    <text x="1060" y="380" font-family="monospace" font-size="20" fill="#ffffff" stroke="none" opacity="0.05">=&gt;</text>
    <text x="1000" y="480" font-family="monospace" font-size="26" fill="#ffffff" stroke="none" opacity="0.07">&lt;&gt;</text>
    <text x="1080" y="130" font-family="monospace" font-size="16" fill="#ffffff" stroke="none" opacity="0.04">::</text>
  </g>

  <!-- Floating dots decoration -->
  <circle cx="200" cy="300" r="2" fill="#3b82f6" opacity="0.3"/>
  <circle cx="350" cy="150" r="1.5" fill="#ffffff" opacity="0.15"/>
  <circle cx="900" cy="200" r="2" fill="#3b82f6" opacity="0.25"/>
  <circle cx="1050" cy="320" r="1.5" fill="#ffffff" opacity="0.12"/>
  <circle cx="150" cy="450" r="1" fill="#3b82f6" opacity="0.2"/>
  <circle cx="1100" cy="500" r="1.5" fill="#3b82f6" opacity="0.2"/>
  <circle cx="300" cy="520" r="1" fill="#ffffff" opacity="0.1"/>
  <circle cx="950" cy="100" r="2" fill="#ffffff" opacity="0.1"/>

  <!-- GitHub Octocat silhouette (simplified) -->
  <g transform="translate(600, 250)" filter="url(#octoGlow)">
    <g transform="translate(-60, -70) scale(0.12)">
      <path fill="#ffffff" opacity="0.9" d="M511.6 76.3C264.3 76.2 64 276.4 64 523.5 64 718.9 189.3 885 363.8 946c23.5 5.9 19.9-10.8 19.9-22.2v-77.5c-135.7 15.9-141.2-73.9-150.3-88.9C215 726 171.5 718 184.5 703c30.9-15.9 62.4 4 98.9 57.9 26.4 39.1 77.9 32.5 104 26 5.7-23.5 17.9-44.5 34.7-60.8-140.6-25.2-199.2-111-199.2-213 0-49.5 16.3-95 48.3-131.7-20.4-60.5 1.9-112.3 4.9-120 58.1-5.2 118.5 41.6 123.2 45.3 33-8.9 70.7-13.6 112.9-13.6 42.4 0 80.2 4.9 113.5 13.9 11.3-8.6 67.3-48.8 121.3-43.9 2.9 7.7 24.7 58.3 5.5 118 32.4 36.8 48.9 82.7 48.9 132.3 0 102.2-59 188.1-200 212.9a127.5 127.5 0 0 1 38.1 91v112.5c.8 9 0 17.9 15 17.9 177.1-59.7 304.6-227 304.6-424.1 0-247.2-200.4-447.3-447.5-447.3z"/>
    </g>
  </g>

  <!-- Horizontal accent line -->
  <rect x="350" y="390" width="500" height="1.5" fill="url(#accentLine)" rx="1"/>

  <!-- Subtle ring around octocat area -->
  <circle cx="600" cy="250" r="130" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <circle cx="600" cy="250" r="160" fill="none" stroke="#3b82f6" stroke-width="0.3" opacity="0.08"/>

  <!-- Corner accents -->
  <path d="M 0 40 L 0 0 L 40 0" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  <path d="M 1160 0 L 1200 0 L 1200 40" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  <path d="M 0 590 L 0 630 L 40 630" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>
  <path d="M 1200 590 L 1200 630 L 1160 630" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>

  <!-- Small decorative lines -->
  <line x1="100" y1="80" x2="180" y2="80" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
  <line x1="1020" y1="550" x2="1100" y2="550" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
</svg>