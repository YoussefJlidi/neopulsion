<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Dark blue background -->
  <rect width="800" height="400" rx="0" fill="#1a1f36"/>
  <!-- Grid pattern -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Data flow visualization -->
  <circle cx="200" cy="200" r="60" stroke="#4f8df9" stroke-width="2" fill="rgba(79,141,249,0.08)"/>
  <text x="200" y="195" text-anchor="middle" fill="#4f8df9" font-family="Inter,sans-serif" font-size="14" font-weight="700">DATA</text>
  <text x="200" y="212" text-anchor="middle" fill="#4f8df9" font-family="Inter,sans-serif" font-size="10" font-weight="500">forSEO</text>
  <!-- Arrow -->
  <line x1="270" y1="200" x2="370" y2="200" stroke="#4f8df9" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- API box -->
  <rect x="380" y="160" width="120" height="80" rx="10" fill="rgba(79,141,249,0.08)" stroke="#4f8df9" stroke-width="1.5"/>
  <text x="440" y="195" text-anchor="middle" fill="#fff" font-family="Inter,sans-serif" font-size="12" font-weight="600">API</text>
  <text x="440" y="212" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="Inter,sans-serif" font-size="9">SERP · KW · Backlinks</text>
  <!-- Arrow -->
  <line x1="510" y1="200" x2="560" y2="200" stroke="#4f8df9" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- Results -->
  <rect x="570" y="140" width="40" height="80" rx="4" fill="#4f8df9" fill-opacity="0.3"/>
  <rect x="620" y="160" width="40" height="60" rx="4" fill="#4f8df9" fill-opacity="0.5"/>
  <rect x="670" y="120" width="40" height="100" rx="4" fill="#4f8df9" fill-opacity="0.8"/>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-family="Inter,sans-serif" font-size="16" font-weight="600">DataForSEO : l'API qui alimente vos outils SEO</text>
</svg>