<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#1a1230"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#ef4444" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="30%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="rgba(255,255,255,0.05)"/>
    </pattern>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="iconGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.937  0 0 0 0 0.267  0 0 0 0 0.267  0 0 0 0.4 0" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="600" cy="280" rx="400" ry="300" fill="url(#glow)"/>
  <ellipse cx="350" cy="400" rx="300" ry="250" fill="url(#glowBlue)"/>

  <!-- Decorative percentages floating -->
  <text x="100" y="160" font-family="system-ui, sans-serif" font-size="32" font-weight="800" fill="#ef4444" opacity="0.12">47%</text>
  <text x="950" y="140" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#ef4444" opacity="0.1">73%</text>
  <text x="1020" y="480" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#ef4444" opacity="0.08">94%</text>
  <text x="80" y="480" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#3b82f6" opacity="0.08">60%</text>
  <text x="200" y="350" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#ffffff" opacity="0.04">33%</text>
  <text x="900" y="320" font-family="system-ui, sans-serif" font-size="22" font-weight="800" fill="#ffffff" opacity="0.04">75%</text>

  <!-- Central icon: magnifying glass with question mark -->
  <g transform="translate(600, 250)" filter="url(#iconGlow)">
    <!-- Magnifying glass body -->
    <circle cx="0" cy="-20" r="80" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.85"/>
    <!-- Glass handle -->
    <line x1="56" y1="37" x2="100" y2="81" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <!-- Question mark inside -->
    <text x="0" y="5" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="#ef4444" text-anchor="middle" opacity="0.9">?</text>
    <!-- Small cross / error -->
    <g transform="translate(60, -70)" opacity="0.7">
      <line x1="-12" y1="-12" x2="12" y2="12" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
      <line x1="12" y1="-12" x2="-12" y2="12" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Accent line -->
  <rect x="300" y="400" width="600" height="1.5" fill="url(#accentLine)" rx="1"/>

  <!-- Subtle rings -->
  <circle cx="600" cy="230" r="140" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.12"/>
  <circle cx="600" cy="230" r="180" fill="none" stroke="#ef4444" stroke-width="0.3" opacity="0.06"/>

  <!-- Floating dots -->
  <circle cx="250" cy="200" r="2" fill="#ef4444" opacity="0.3"/>
  <circle cx="400" cy="120" r="1.5" fill="#ffffff" opacity="0.15"/>
  <circle cx="850" cy="180" r="2" fill="#3b82f6" opacity="0.2"/>
  <circle cx="1050" cy="280" r="1.5" fill="#ef4444" opacity="0.2"/>
  <circle cx="180" cy="520" r="1" fill="#3b82f6" opacity="0.15"/>
  <circle cx="1080" cy="150" r="1" fill="#ffffff" opacity="0.1"/>

  <!-- Corner accents -->
  <path d="M 0 40 L 0 0 L 40 0" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
  <path d="M 1160 0 L 1200 0 L 1200 40" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
  <path d="M 0 590 L 0 630 L 40 630" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>
  <path d="M 1200 590 L 1200 630 L 1160 630" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.3"/>

  <!-- Small decorative lines -->
  <line x1="100" y1="80" x2="180" y2="80" stroke="#ef4444" stroke-width="0.5" opacity="0.2"/>
  <line x1="1020" y1="550" x2="1100" y2="550" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
</svg>